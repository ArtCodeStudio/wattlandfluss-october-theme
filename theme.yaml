                    ev: 'eingetragener Verein (e.V.)'
                    ek: 'eingetragener Kaufmann (e.K.)'
                    einzelkaufmann: Einzelkaufmann
                    einzelunternehmer: Einzelunternehmer
                    fh: Fachhochschule
                    freiberufler: Freiberufler
                    ggmbh: 'gemeinnützige GmbH (gGmbH)'
                    gbr: 'Gesellschaft bürgerlichen Rechts (GbR)'
                    gmbh: 'Gesellschaft mit beschränkter Haftung'
                    gmbhkg: 'GmbH & CO. KG'
                    kg: 'Kommanditgesellschaft (KG)'
                    kgag: 'Kommanditgesellschaft auf Aktien (KGaA)'
                    koerperschaft: 'Körperschaft des öffentlichen Rechts'
                    ohg: 'Offene Handelsgesellschaft (OHG)'
                    partnerschaftsgesellschaft: Partnerschaftsgesellschaft
                    privatperson: Privatperson
                    stiftung: Stiftung
                    other: Sonstiges
