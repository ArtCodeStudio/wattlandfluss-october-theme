                commentHtml: true
                tab: Impressum
            info_operator_type_section:
                label: 'Wer ist Betreiber der Website?'
                type: section
                cssClass: without-line
                comment: 'Bitte wählen Sie hier aus, wer Betreiber der Website ist. <p class="help-block"><strong>Anmerkung zur Option "Privatperson":</strong> Websites, die ausschließlich "persönlichen oder familiären Zwecken" dienen, benötigen kein Impressum. Die Rechtsprechung ist jedoch zurückhaltend mit der Annahme rein privater Seiten. Schon ein Werbebanner oder ein Affiliate-Link können genügen, um als "kommerziell" zu gelten. Unternehmenswebseiten und Shops sind hingegen nie privat.</p> <p class="help-block">Auch Blogs dienen wohl in den seltensten Fällen ausschließlich persönlichen oder familiären Zwecken und sollten deshalb über ein Impressum verfügen.</p>'
                commentHtml: true
                tab: Impressum
            info_operator_type:
                label: 'Betreiber ist'
                type: dropdown
                cssClass: with-bottom-line
                options:
