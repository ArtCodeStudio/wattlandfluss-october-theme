name: wattlandfluss-october-theme
description: 'October Bootstrap 4 Boilerplate Theme by JumpLink'
author: 'Pascal Garber <pascal.jumplink.eu>'
homepage: 'https://www.artandcode.studio'
code: wattlandfluss
license: MIT
form:
    tabs:
        fields:
            site_name:
                label: 'Site name'
                type: text
                comment: 'Name of your site'
                default: ''
                tab: General
            site_desc:
                label: 'Site description'
                type: text
                comment: 'Describe your site in one sentence'
                default: ''
                tab: General
            phone_number:
                label: Phone
                type: text
                comment: 'Phone number'
                default: '0172 - 4454451'
                tab: General
            email_address:
                label: Email
                type: text
                comment: 'Email address for contact form and imprint'
                default: hello@yoursite.de
                tab: General
            owner_name:
                label: 'Owner Name'
                type: text
                comment: 'The name of the owner of this site'
                default: 'Owners Name '
                tab: General
            street:
                label: Street
                type: text
                comment: 'The street for contact and location'
                default: 'Owners Street 6'
                tab: General
            city:
                label: 'Place, location or city'
                type: text
                default: 'Super City'
                tab: General
            zip:
                label: Zip
                type: text
                comment: 'zip code, postal code'
                default: 520
                tab: General
            country:
                label: Country
                type: text
                comment: 'country, land, state, shore, ground, province'
                default: Deutschland
                tab: General
            pp_general_pp_section:
                label: 'Allgemeine Datenschutzerklärung'
                type: section
                cssClass: without-line
                comment: 'Soll die Datenschutzerklärung einen allgemeinen Datenschutzpassus für Ihre Website enthalten?'
                commentHtml: true
                tab: Datenschutzerklärung
            pp_general_pp:
                label: 'Ja, ich möchte einen allgemeinen Datenschutzpassus einfügen.'
                type: checkbox
                cssClass: with-bottom-line
                default: false
                comment: 'Fast alle Websites erheben personenbezogene Daten. Erstellen Sie hier schnell und einfach eine passende Datenschutzerklärung für Ihre Seite.'
                commentHtml: true
                tab: Datenschutzerklärung
            pp_cookies_section:
                label: 'Verwendung von Cookies'
                type: section
                cssClass: without-line
                comment: 'Sofern Ihre Website Informationen in Cookie-Dateien zwischenspeichert, empfiehlt es sich, einen entsprechenden Hinweis in die Datenschutzerklärung zu integrieren.'
                commentHtml: true
                tab: Datenschutzerklärung
            pp_cookies:
                label: 'Ja, ich möchte in meine Datenschutzerklärung einen zusätzlichen Hinweis für die Speicherung von Daten in Cookies integrieren.'
                type: checkbox
                cssClass: with-bottom-line
                default: false
                commentHtml: true
                tab: Datenschutzerklärung
            pp_server_log_data_section:
                label: 'Log-Dateien auf dem Server'
                type: section
                cssClass: without-line
