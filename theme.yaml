            info_lawyer_section:
                label: 'Vertreten durch'
                type: section
                cssClass: without-line
                comment: "<p class=\"help-block\">Bei juristischen Personen und Personengesellschaften sind der oder die Vertretungsberechtigten anzugeben. Die Vertretungsbefugnis ergibt sich aus der Gesellschaftsform, dem Gesellschaftsvertrag oder den gesetzlichen Regelungen und ist je nach Unternehmensform unterschiedlich geregelt.</p> <ul class=\"help-block\"> <li>GbR: vertreten durch die Gesellschafter</li> <li>GmbH: vertreten durch die Geschäftsführer</li> <li>GmbH & Co. KG: vertreten durch die Komplementär-GmbH, die ihrerseits\tvertreten wird durch die Geschäftsführer der GmbH</li> <li>OHG: vertreten durch die Gesellschafter</li> <li>KG: vertreten durch die Komplementäre</li> <li>AG, e.V., e.G.: vertreten durch den Vorstand</li> </ul> <p class=\"help-block\">Durch Gesellschaftsvertrag können im Einzelfall abweichende Regelungen getroffen werden. Bei mehreren vertretungsberechtigten Personen sollten alle angegeben werden.</p>"
                commentHtml: true
                tab: Impressum
            info_lawyer:
                label: 'Vertreten durch'
                type: text
                placeholder: 'Herr Dr. Harry Mustermann'
                cssClass: with-bottom-line
                comment: 'Bitte geben Sie hier die vollständigen Vor- und Nachnamen der vertretungsberechtigten Personen und ggf. den Firmennamen bei jur. Personen an. Beispiel: XYZ GmbH, vertreten durch den GF Paul Müller'
